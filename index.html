<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel da Loja - Controle de Presen&ccedil;a</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#8a0000",
            secondary: "#1e293b",
            background: "#f8fafc"
          },
          fontFamily: {
            sans: ["Public Sans", "sans-serif"]
          },
          borderRadius: {
            custom: "12px"
          }
        }
      }
    };
  </script>
  <link rel="icon" type="image/png" href="logo-loja.png">
  <link rel="apple-touch-icon" href="logo-loja.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-background text-secondary">
  <header class="site-header">
    <div class="topbar">
      <div class="brand-wrap">
        <div class="brand-mark"><img src="logo-loja.png" alt="Logo da loja" class="brand-logo" onerror="this.style.display='none'; this.parentElement.classList.add('fallback-brand'); this.parentElement.textContent='A';"></div>
        <div>
          <h1 class="brand-title">Painel da Loja</h1>
          <p class="brand-subtitle">Controle de presen&ccedil;a</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
          <span id="themeToggleIcon">?</span>
        </button>
        <button type="button" class="help-btn" aria-label="Ajuda">?</button>
        <div class="profile-chip">
          <div class="profile-avatar"><img src="logo-loja.png" alt="Logo da loja" class="profile-logo" onerror="this.style.display='none'; this.parentElement.classList.add('fallback-avatar'); this.parentElement.textContent='FP';"></div>
          <div class="profile-meta">
            <strong>F&aacute;bio Lu&iacute;s Pocai</strong>
            <span id="todayLabel"></span>
          </div>
        </div>
      </div>
    </div>

    <nav class="topnav">
      <button class="menu-link active active-nav-item" data-view="dashboard">Painel</button>
      <button class="menu-link" data-view="brothers">Irm&atilde;os</button>
      <button class="menu-link" data-view="sessions">Sess&otilde;es</button>
      <button class="menu-link" data-view="reports">Relat&oacute;rios</button>
      <button class="menu-link" data-view="calendar">Calend&aacute;rio</button>
    </nav>
  </header>

  <main class="main-shell">
    <section class="lodge-banner">
      <p class="page-breadcrumb">PAINEL / HOME</p>
      <h2 class="lodge-name">A.'.R.'.G.'.E.'.D.'.P.'.M.'.L.'.S.'. F&eacute;, Esperan&ccedil;a e Caridade 100</h2>
    </section>

    <div class="content-wrap space-y-6 max-w-7xl mx-auto">
    <section id="dashboard" class="view active"></section>
    <section id="brothers" class="view"></section>
    <section id="sessions" class="view"></section>
    <section id="reports" class="view"></section>
    <section id="calendar" class="view"></section>
    </div>
  </main>

  <template id="dashboardTemplate">
    <section class="bg-gradient-to-br from-primary to-[#a30000] rounded-custom p-6 text-white shadow-lg shadow-red-900/10">
      <p class="text-xs font-semibold uppercase tracking-wider opacity-80 mb-1">Vis&atilde;o Geral</p>
      <h2 class="text-2xl font-bold mb-2" id="dashboardGreeting">Frequ&ecirc;ncia geral</h2>
      <p class="text-sm opacity-90 leading-relaxed" id="dashboardSubtitle">Resumo de sess&otilde;es, visitantes e anivers&aacute;rios do quadro para o per&iacute;odo atual.</p>
    </section>

    <section class="grid grid-cols-3 gap-3">
      <div class="bg-white p-4 rounded-custom shadow-sm border border-gray-50 text-center">
        <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Irm&atilde;os</p>
        <p class="text-xl font-bold text-primary" id="brothersCount">0</p>
        <p class="text-[9px] text-gray-400">ativos</p>
      </div>
      <div class="bg-white p-4 rounded-custom shadow-sm border border-gray-50 text-center">
        <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Sess&otilde;es</p>
        <p class="text-xl font-bold text-primary" id="sessionsCount">0</p>
        <p class="text-[9px] text-gray-400">registradas</p>
      </div>
      <div class="bg-white p-4 rounded-custom shadow-sm border border-gray-50 text-center">
        <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Visitantes</p>
        <p class="text-xl font-bold text-primary" id="visitorsCount">0</p>
        <p class="text-[9px] text-gray-400">lan&ccedil;ados</p>
      </div>
    </section>

    <section class="dashboard-panels">
      <article class="bg-white rounded-custom p-5 shadow-sm border border-gray-50">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-4">Distribui&ccedil;&atilde;o das Sess&otilde;es</h3>
        <div class="dashboard-chart-wrap">
          <div class="chart-container">
            <div id="dashboardPie" class="pie-chart"></div>
            <div class="pie-center">
              <span class="text-2xl font-bold text-secondary" id="dashboardPieTotal">0</span>
              <span class="text-[10px] text-gray-400 uppercase">Total</span>
            </div>
          </div>
          <div id="dashboardLegend" class="legend-list w-full"></div>
        </div>
      </article>

      <article class="bg-white rounded-custom p-5 shadow-sm border border-gray-50">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-4">Pr&oacute;ximas Datas</h3>
        <div id="birthdayHighlights" class="stack-list"></div>
      </article>
    </section>

    <section class="bg-white rounded-custom p-5 shadow-sm border border-gray-50">
      <div class="panel-header">
        <div>
          <p class="section-kicker">Calend&aacute;rio</p>
          <h3 class="section-title">Agenda de anivers&aacute;rios</h3>
        </div>
      </div>
      <div id="dashboardCalendar"></div>
    </section>
  </template>

  <template id="brothersTemplate">
    <div class="sessions-layout brothers-layout">
      <section class="sessions-page-header">
        <div>
          <h2 class="page-title">Irm&atilde;os do Quadro</h2>
          <p class="page-breadcrumb">PAINEL / CONTATOS / IRM&Atilde;OS DO QUADRO</p>
        </div>
        <div class="sessions-toolbar brothers-toolbar">
          <input id="brotherSearch" class="search-input toolbar-input" type="search" placeholder="Pesquisar por nome...">
          <select id="brotherDegreeFilter" class="toolbar-input" aria-label="Filtrar por grau">
            <option value="">Todos graus</option>
            <option value="aprendiz">Aprendiz</option>
            <option value="companheiro">Companheiro</option>
            <option value="mestre">Mestre</option>
          </select>
          <button type="button" class="btn-secondary toolbar-search-btn" id="brotherFilterBtn">Buscar</button>
          <button type="button" class="btn btn-add-session" id="openBrotherFormBtn">Cadastrar</button>
        </div>
      </section>

      <article class="panel-card brothers-table-card">
        <div id="brothersTable"></div>
      </article>

      <article class="panel-card" id="brotherFormCard">
        <div class="panel-header">
          <div>
            <p class="section-kicker">Cadastro</p>
            <h2 class="section-title">Irm&atilde;o do quadro</h2>
          </div>
        </div>
        <form id="brotherForm" class="form-grid"></form>
      </article>
    </div>
  </template>

  <template id="sessionsTemplate">
    <div class="sessions-layout">
      <section class="sessions-page-header">
        <div>
          <h2 class="page-title">Sess&otilde;es</h2>
          <p class="page-breadcrumb">PAINEL / SESS&Otilde;ES</p>
        </div>
        <div class="sessions-toolbar">
          <input id="sessionSearch" class="search-input toolbar-input" type="search" placeholder="Pesquisar por tema...">
          <input id="sessionDateFrom" class="toolbar-input" type="date" aria-label="Filtrar data inicial">
          <input id="sessionDateTo" class="toolbar-input" type="date" aria-label="Filtrar data final">
          <button type="button" class="toolbar-icon-btn" id="sessionFilterBtn" aria-label="Aplicar filtro">âŒ•</button>
          <button type="button" class="btn btn-add-session" id="openSessionFormBtn">Cadastrar</button>
        </div>
      </section>

      <article class="panel-card sessions-table-card">
        <div id="sessionsList"></div>
      </article>

      <article class="panel-card" id="sessionFormCard">
        <div class="panel-header">
          <div>
            <p class="section-kicker">Sess&atilde;o</p>
            <h2 class="section-title">Cadastro e edi&ccedil;&atilde;o</h2>
          </div>
        </div>
        <form id="sessionForm" class="form-grid"></form>
      </article>
    </div>
  </template>

  <template id="reportsTemplate">
    <div class="reports-layout">
      <article class="panel-card">
        <div class="panel-header">
          <div>
            <p class="section-kicker">Relat&oacute;rio</p>
            <h2 class="section-title">Irm&atilde;os do quadro</h2>
          </div>
        </div>
        <div id="brothersReportControls"></div>
        <div id="brothersReportTable"></div>
      </article>
      <article class="panel-card">
        <div class="panel-header">
          <div>
            <p class="section-kicker">Relat&oacute;rio</p>
            <h2 class="section-title">Presen&ccedil;as por per&iacute;odo</h2>
          </div>
        </div>
        <div id="attendanceReportControls"></div>
        <div class="report-summary">
          <div class="chart-container">
            <div id="attendancePie" class="pie-chart large"></div>
          </div>
          <div id="attendanceLegend" class="legend-list"></div>
        </div>
        <div id="attendanceReportTable"></div>
      </article>
      <article class="panel-card">
        <div class="panel-header">
          <div>
            <p class="section-kicker">Relat&oacute;rio</p>
            <h2 class="section-title">Visitantes frequentes</h2>
          </div>
        </div>
        <div id="visitorsReportControls"></div>
        <div id="visitorsReportTable"></div>
      </article>
    </div>
  </template>

  <template id="calendarTemplate">
    <div class="content-grid">
      <article class="panel-card span-2">
        <div class="panel-header">
          <div>
            <p class="section-kicker">Calend&aacute;rio</p>
            <h2 class="section-title">Anivers&aacute;rios de irm&atilde;os e esposas</h2>
          </div>
        </div>
        <div id="calendarContent"></div>
      </article>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
